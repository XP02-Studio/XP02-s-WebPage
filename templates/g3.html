<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Memory Match</title>
    <link rel="stylesheet" href="../static/gamestyle.css">
</head>
<body>
    <div class="backbutton">
        <a href="gamepage.html">Back</a>
    </div>

    <div id="memory-game-anchor" class="game-card">
        <div class="game-header">
            <h3>🃏 Cyberpunk Memory Match</h3>
            <p>Find matching pairs of neon databanks. Uncover the entire 4x4 matrix deck in as few moves as possible!</p>
        </div>

        <div id="memory-grid" class="matrix-grid"></div>
        
        <div class="game-stats-row">
            <span id="memory-moves">Moves: 0</span>
            <span id="memory-best" style="color: #8ab4f8;">Best Rank: --</span>
        </div>

        <div id="memory-status-banner">
            Click any card to begin decoding
        </div>
    </div>

    <script src="../script/memoryscript.js"></script>
</body>
</html>
