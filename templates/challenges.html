<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP02's Challenges</title>
    <link rel="stylesheet" href="../static/challenges_style.css">
</head>
<body>
    <h1>Challenges</h1>
    <div class="settings-container">
        <!-- Hidden Radios to track state -->
        <input type="radio" name="tabs" id="tab-clicks" checked>
        <input type="radio" name="tabs" id="tab-explorer">
        <input type="radio" name="tabs" id="tab-easter">

        <!-- Sidebar Labels -->
        <div class="sidebar">
            <label for="tab-clicks" class="tab-label">Clicks</label>
            <label for="tab-explorer" class="tab-label">Explorer</label>
            <label for="tab-easter" class="tab-label">Easter Egg</label>
        </div>

        <!-- Content Panels -->
        <div class="content">
            <div id="clicks-panel" class="tab-panel">
                <h2>Clicks Counter</h2><hr>
                <p>This website counts the number of clicks happened</p>
                <p>comming soon...</p>
            </div>
            <div id="explorer-panel" class="tab-panel">
                <h2>Explorer Quest</h2><hr>
                <p>The pages visited will be shown here</p>
                <p>comming soon..</p>
            </div>
            <div id="easter-panel" class="tab-panel">
                <h2>Easter Egg Hunt</h2><hr>
                <p>comming soon...</p>
            </div>
        </div>
    </div>
</body>
</html>
